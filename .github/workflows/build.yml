name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: WaveDAQ ${{ github.ref_name }}
          draft: false
          prerelease: false

  build-mac:
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller WaveDAQ.spec

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "WaveDAQ" \
            --volicon "logo.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "WaveDAQ.app" 175 190 \
            --hide-extension "WaveDAQ.app" \
            --app-drop-link 425 190 \
            "WaveDAQ-mac-${{ github.ref_name }}.dmg" \
            "dist/WaveDAQ.app"

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: WaveDAQ-mac-${{ github.ref_name }}.dmg

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller WaveDAQ.spec

      - name: Rename executable
        run: mv dist/WaveDAQ.exe WaveDAQ-windows-${{ github.ref_name }}.exe

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          files: WaveDAQ-windows-${{ github.ref_name }}.exe
