name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WaveDAQ ${{ github.ref_name }}
          draft: false
          prerelease: false

  build-mac:
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pillow

      - name: Generate icns icon
        run: |
          python - <<'EOF'
          from PIL import Image
          import os, subprocess
          img = Image.open('logo.png').convert('RGBA')
          os.makedirs('/tmp/WaveDAQ.iconset', exist_ok=True)
          for s in [16,32,64,128,256,512,1024]:
              img.resize((s,s)).save(f'/tmp/WaveDAQ.iconset/icon_{s}x{s}.png')
              img.resize((s*2,s*2)).save(f'/tmp/WaveDAQ.iconset/icon_{s}x{s}@2x.png')
          subprocess.run(['iconutil','-c','icns','/tmp/WaveDAQ.iconset','-o','logo.icns'],check=True)
          EOF

      - name: Build with PyInstaller
        run: pyinstaller WaveDAQ.spec

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "WaveDAQ" \
            --volicon "logo.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "WaveDAQ.app" 175 190 \
            --hide-extension "WaveDAQ.app" \
            --app-drop-link 425 190 \
            "WaveDAQ-mac-${{ github.ref_name }}.dmg" \
            "dist/WaveDAQ.app"

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: WaveDAQ-mac-${{ github.ref_name }}.dmg

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pillow

      - name: Generate ico icon
        run: |
          python -c "
          from PIL import Image
          img = Image.open('logo.png').convert('RGBA')
          img.resize((256,256)).save('logo.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          "

      - name: Build with PyInstaller
        run: pyinstaller WaveDAQ.spec

      - name: Rename executable
        run: mv dist/WaveDAQ.exe WaveDAQ-windows-${{ github.ref_name }}.exe

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          files: WaveDAQ-windows-${{ github.ref_name }}.exe
